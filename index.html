<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lughati Prime</title>
    <style>
        :root { --p: #58cc02; --s: #1cb0f6; --err: #ff4b4b; --text: #3c3c3c; --gray: #e5e5e5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; background: #fff; }
        .app { width: 100%; max-width: 480px; height: 100vh; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .progress-bg { flex-grow: 1; background: var(--gray); height: 12px; border-radius: 10px; }
        #fill { background: var(--p); height: 100%; width: 0%; border-radius: 10px; transition: 0.4s; }
        .hearts { color: var(--err); font-weight: bold; font-size: 18px; }
        .tile { border: 2px solid var(--gray); border-bottom: 4px solid var(--gray); border-radius: 14px; padding: 15px; margin: 10px 0; cursor: pointer; font-weight: bold; text-align: center; }
        .tile:active { transform: translateY(2px); border-bottom-width: 2px; }
        .context-box { background: #f0f9ff; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 5px solid var(--s); font-size: 15px; }
        .target-area { min-height: 80px; border-top: 2px solid #eee; border-bottom: 2px solid #eee; padding: 15px 0; display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .word-bank { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .word { padding: 10px 14px; border: 2px solid var(--gray); border-bottom: 4px solid var(--gray); border-radius: 12px; background: white; cursor: pointer; font-weight: bold; }
        .word.used { background: var(--gray); color: transparent; pointer-events: none; }
        .footer { margin-top: auto; padding: 15px 0; }
        .btn-check { width: 100%; background: var(--p); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 0 #46a302; }
    </style>
</head>
<body>

<div class="app" id="app-content">
    <!-- Écran d'accueil (Image 1000020774.jpg) -->
    <div id="home-screen">
        <h1 style="font-size: 32px; margin-bottom: 10px;">Bienvenue sur Lughati</h1>
        <p style="color: #666; margin-bottom: 30px;">Pour commencer, quel est votre profil ?</p>
        <div class="tile" onclick="startLesson()">🐣 Je suis débutant (Niveau 1)</div>
        <div class="tile" onclick="alert('Test de niveau bientôt disponible !')">🧠 Je connais déjà les bases</div>
    </div>
</div>

<script>
    const lessonData = {
        context: "Vous arrivez à l'aéroport et un ami vous accueille.",
        instr: "Traduisez : 'Bienvenue ! Comment était votre vol ?'",
        correct: ["Ahlan", "wa", "sahlan", "!", "Kayfa", "kanat", "rihlatuka", "?"],
        pool: ["Ahlan", "wa", "sahlan", "!", "Kayfa", "kanat", "rihlatuka", "?", "Baba", "Shukran"]
    };

    function startLesson() {
        document.getElementById('app-content').innerHTML = `
            <div class="header">
                <span style="font-size:24px; color:#ccc; cursor:pointer" onclick="location.reload()">✕</span>
                <div class="progress-bg"><div id="fill"></div></div>
                <div class="hearts">❤️ 5</div>
            </div>
            <div class="instruction" style="font-weight:bold; font-size:20px; margin-bottom:10px;">${lessonData.instr}</div>
            <div class="context-box">${lessonData.context}</div>
            <div class="target-area" id="target"></div>
            <div class="word-bank" id="bank"></div>
            <div class="footer"><button class="btn-check" onclick="checkAnswer()">VÉRIFIER</button></div>
        `;
        
        const bank = document.getElementById('bank');
        lessonData.pool.sort(() => Math.random() - 0.5).forEach(w => {
            const div = document.createElement('div');
            div.className = 'word';
            div.innerText = w;
            div.onclick = () => {
                if(div.classList.contains('used')) return;
                const clone = div.cloneNode(true);
                clone.onclick = () => { clone.remove(); div.classList.remove('used'); };
                document.getElementById('target').appendChild(clone);
                div.classList.add('used');
            };
            bank.appendChild(div);
        });
    }

    function checkAnswer() {
        const userWords = Array.from(document.getElementById('target').children).map(c => c.innerText);
        if(userWords.join(' ') === lessonData.correct.join(' ')) {
            alert("Excellent ! 🎉 C'est la bonne réponse.");
            location.reload();
        } else {
            alert("Dommage ! Réessayez.");
        }
    }
</script>

</body>
</html>
